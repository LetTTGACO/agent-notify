services:
  agent-notify:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    ports:
      - "8787:8787"
    environment:
      AGENT_NOTIFY_HOST: "0.0.0.0"
      AGENT_NOTIFY_PORT: "8787"
      AGENT_NOTIFY_TOKENS: "${AGENT_NOTIFY_TOKENS}"
      AGENT_NOTIFY_PROVIDER: "bark"
      BARK_ENDPOINT: "${BARK_ENDPOINT}"
      AGENT_NOTIFY_CLAUDE_COMPLETION_MIN_SECONDS: "${AGENT_NOTIFY_CLAUDE_COMPLETION_MIN_SECONDS:-0}"
      AGENT_NOTIFY_LOG_PATH: "/data/events.jsonl"
      AGENT_NOTIFY_LOG_RAW: "false"
    volumes:
      - agent-notify-data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8787/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  agent-notify-data:
